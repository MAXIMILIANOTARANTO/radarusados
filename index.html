<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RadarUsados · Córdoba</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">Radar<span>Usados</span></div>
      <div class="sub">Inteligencia de mercado para agencias · Córdoba, Argentina</div>
    </header>

    <nav class="tabs">
      <button class="tab on" data-tab="cotizar">Cotizador</button>
      <button class="tab" data-tab="radar">Radar</button>
      <button class="tab" data-tab="memoria">Memoria</button>
    </nav>

    <!-- COTIZADOR -->
    <section id="cotizar">
      <div class="card">
        <div class="kicker">Vehículo a cotizar</div>
        <div class="grid">
          <div><label class="l">Marca</label><input id="marca" placeholder="Toyota"></div>
          <div><label class="l">Modelo</label><input id="modelo" placeholder="Hilux"></div>
          <div><label class="l">Versión</label><input id="version" placeholder="SRX 4x4"></div>
          <div><label class="l">Año</label><input id="anio" placeholder="2021" inputmode="numeric"></div>
          <div><label class="l">Kilometraje</label><input id="km" placeholder="80000" inputmode="numeric"></div>
          <div><label class="l">Estado</label>
            <select id="estado">
              <option>Excelente</option>
              <option selected>Muy bueno</option>
              <option>Bueno</option>
              <option>Regular</option>
            </select>
          </div>
        </div>
        <button class="btn" id="btnCotizar">Cotizar</button>
        <div id="cotErr" class="err" style="display:none"></div>
        <div id="cotLoad" class="load" style="display:none"><div class="dot"></div> Analizando mercado cordobés…</div>
      </div>
      <div id="cotOut"></div>
    </section>

    <!-- RADAR -->
    <section id="radar" style="display:none">
      <div class="card">
        <div class="kicker">Radar de mercado — Córdoba</div>
        <button class="btn" id="btnRadar">Activar Radar</button>
        <div id="radErr" class="err" style="display:none"></div>
        <div id="radLoad" class="load" style="display:none"><div class="dot"></div> Relevando sector…</div>
      </div>
      <div id="radOut"></div>
    </section>

    <!-- MEMORIA -->
    <section id="memoria" style="display:none">
      <div class="card">
        <div class="row">
          <div class="kicker" style="margin:0">Memoria encadenada</div>
          <button class="mini" id="btnExport">Exportar</button>
        </div>
        <div id="memOut"></div>
      </div>
    </section>
  </div>

  <script src="js/memory.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
